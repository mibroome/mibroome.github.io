<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Native Star Stories Night Parking Pass Download</title>

<style>
body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f7f7f7;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    text-align: center;
    max-width: 420px;
}

h1 {
    margin-top: 0;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 14px 26px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #1e4ed8;
}

.note {
    margin-top: 15px;
    font-size: 14px;
    color: #666;
}
</style>
</head>

<body>

<div class="card">
<h1>Native Star Stories Night Parking Pass Download</h1>

<p>
Click below to download your parking pass.
You may return here anytime if you need another copy.
</p>

<button onclick="downloadPass()">
Download Parking Pass (PDF)
</button>

<p class="note">
If the download does not start automatically,
right-click and choose “Open link”.
</p>

</div>

<script>
function downloadPass() {

    // Track button click separately from page visit
    if (window.goatcounter) {
        window.goatcounter.count({
            path: 'parking-pass-download-click',
            title: 'Parking Pass Download Click'
        });
    }

    // Download PDF
    window.location.href = "parking-pass.pdf";
}
</script>

<!-- GoatCounter analytics -->
<script data-goatcounter="https://mibroome.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

</body>
</html>
