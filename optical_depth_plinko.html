<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optical Depth — Plinko Physics Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0a0c10; --panel: #111318; --panel2: #161920;
    --border: #252830; --accent: #4af0c0; --accent2: #f07040;
    --text: #c8cdd8; --text-dim: #5a6070;
    --font-mono: 'Space Mono', monospace; --font-head: 'Syne', sans-serif;
    --radius: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 12px; min-height: 100vh; overflow-x: hidden; }

  header { padding: 18px 24px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 16px; background: var(--panel); }
  header h1 { font-family: var(--font-head); font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  header span { color: var(--accent); font-size: 11px; letter-spacing: 0.08em; }

  .tab-bar { display: flex; background: var(--panel); border-bottom: 1px solid var(--border); padding: 0 16px; }
  .tab-bar button { background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-dim); font-family: var(--font-mono); font-size: 11px; padding: 10px 14px; cursor: pointer; letter-spacing: 0.06em; transition: color 0.15s, border-color 0.15s; }
  .tab-bar button.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-bar button:hover { color: #fff; }

  .app-body { display: flex; height: calc(100vh - 90px); overflow: hidden; }

  .sidebar { width: 220px; min-width: 220px; background: var(--panel); border-right: 1px solid var(--border); padding: 14px 12px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; transition: border-right-color 0.2s; }
  .sidebar.targeting-a { border-right-color: rgba(74,240,192,0.45); }
  .sidebar.targeting-b { border-right-color: rgba(160,106,240,0.45); }

  .ctrl-group { display: flex; flex-direction: column; gap: 7px; }
  .ctrl-group label { color: var(--text-dim); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
  .ctrl-group .val { color: var(--accent); float: right; font-size: 10px; }

  input[type=range] { -webkit-appearance: none; width: 100%; height: 3px; border-radius: 2px; background: var(--border); outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; transition: transform 0.1s; }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

  .scenario-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .scenario-btns button { background: var(--panel2); border: 1px solid var(--border); color: var(--text); font-family: var(--font-mono); font-size: 10px; padding: 7px 4px; border-radius: 5px; cursor: pointer; transition: all 0.15s; line-height: 1.3; }
  .scenario-btns button:hover { border-color: var(--accent); color: var(--accent); }
  .scenario-btns button.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

  .action-btns { display: flex; flex-direction: column; gap: 6px; }
  .btn-drop { background: var(--accent); color: #000; border: none; font-family: var(--font-head); font-size: 13px; font-weight: 800; padding: 10px; border-radius: var(--radius); cursor: pointer; letter-spacing: 0.04em; transition: opacity 0.15s, transform 0.1s; }
  .btn-drop:hover { opacity: 0.85; }
  .btn-drop:active { transform: scale(0.97); }
  .btn-reset { background: none; color: var(--text-dim); border: 1px solid var(--border); font-family: var(--font-mono); font-size: 11px; padding: 8px; border-radius: var(--radius); cursor: pointer; transition: all 0.15s; }
  .btn-reset:hover { border-color: var(--accent2); color: var(--accent2); }

  .sep { height: 1px; background: var(--border); }

  .canvas-area { flex: 1; display: flex; overflow: hidden; }
  .plinko-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .plinko-label { padding: 6px 14px; font-size: 10px; letter-spacing: 0.1em; color: var(--text-dim); background: var(--panel2); border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: center; }
  .plinko-label .lbl-tag { font-weight: 700; }
  canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
  .side-split { border-right: 1px solid var(--border); }
  .stats-bar { display: flex; gap: 16px; padding: 5px 14px; background: var(--panel2); border-top: 1px solid var(--border); font-size: 10px; letter-spacing: 0.06em; }
  .stat { color: var(--text-dim); }
  .stat span { color: var(--accent); margin-left: 4px; }

  /* Board selector */
  .board-selector { display: none; flex-direction: column; gap: 5px; }
  .board-selector.visible { display: flex; }
  .board-selector label { color: var(--text-dim); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
  .board-sel-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .board-sel-btns button { background: var(--panel2); border: 2px solid var(--border); color: var(--text-dim); font-family: var(--font-mono); font-size: 11px; font-weight: 700; padding: 8px 4px; border-radius: 5px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em; }
  .board-sel-btns button:hover { color: #fff; border-color: #555; }
  .board-sel-btns button.sel-a.active { background: rgba(74,240,192,0.15); border-color: #4af0c0; color: #4af0c0; }
  .board-sel-btns button.sel-b.active { background: rgba(160,106,240,0.15); border-color: #a06af0; color: #a06af0; }

  /* Note banner shown in compare mode about shared layout */
  .shared-note { display: none; font-size: 9px; color: var(--text-dim); line-height: 1.5; padding: 6px 8px; background: rgba(74,240,192,0.05); border: 1px solid rgba(74,240,192,0.12); border-radius: 4px; letter-spacing: 0.04em; }
  .shared-note.visible { display: block; }
</style>
</head>
<body>

<header>
  <h1>Optical Depth</h1>
  <span>PLINKO PHYSICS DEMO</span>
</header>

<div class="tab-bar">
  <button id="tab-single" class="active" onclick="setMode('single')">SINGLE BOARD</button>
  <button id="tab-compare" onclick="setMode('compare')">SIDE-BY-SIDE COMPARE</button>
</div>

<div class="app-body">
  <div class="sidebar" id="sidebar">

    <!-- Board selector — compare mode only -->
    <div class="board-selector" id="board-selector">
      <label>EDITING BOARD</label>
      <div class="board-sel-btns">
        <button id="sel-btn-a" class="sel-a active" onclick="selectBoard(0)">&#9632; BOARD A</button>
        <button id="sel-btn-b" class="sel-b"        onclick="selectBoard(1)">&#9632; BOARD B</button>
      </div>
    </div>
    <div class="sep" id="board-sel-sep" style="display:none"></div>

    <div class="ctrl-group">
      <label>SCENARIO PRESETS</label>
      <div class="scenario-btns">
        <button id="sc1" onclick="applyScenario(1)">S1<br>EUV</button>
        <button id="sc2" onclick="applyScenario(2)">S2<br>X-RAYS</button>
        <button id="sc3" onclick="applyScenario(3)">S3<br>X-RAY<br>+METALS</button>
        <button id="sc4" onclick="applyScenario(4)">S4<br>METALS<br>+COMPRESSED</button>
      </div>
    </div>

    <div class="sep"></div>

    <div class="ctrl-group">
      <label>CROSS SECTION <span class="val" id="lbl-pin">4</span>px</label>
      <input type="range" id="sl-pin" min="2" max="20" value="4" oninput="onSlider()">
    </div>

    <div class="ctrl-group">
      <label>METALS CROSS SECTION <span class="val" id="lbl-lpin">14</span>px</label>
      <input type="range" id="sl-lpin" min="6" max="34" value="14" oninput="onSlider()">
    </div>

    <div class="ctrl-group">
      <label>METALLICITY <span class="val" id="lbl-lfrac">0%</span></label>
      <input type="range" id="sl-lfrac" min="0" max="100" value="0" oninput="onSlider()">
    </div>

    <div class="ctrl-group">
      <label>NUMBER DENSITY (n) <span class="val" id="lbl-dens">50</span></label>
      <input type="range" id="sl-dens" min="10" max="300" value="50" oninput="onSlider()">
    </div>

    <div class="ctrl-group">
      <label>SCALE HEIGHT (H) <span class="val" id="lbl-H">1.00</span></label>
      <input type="range" id="sl-H" min="1" max="100" value="100" oninput="onSlider()">
    </div>

    <!-- Note about shared layout in compare mode -->
    <div class="shared-note" id="shared-note">
      Pin x/y positions are shared between boards. Only cross sections differ.
    </div>

    <div class="sep"></div>

    <div class="action-btns">
      <button class="btn-drop" onclick="dropBall()">&#9660; DROP BALL</button>
      <button class="btn-reset" onclick="resetLines()">&#8635; RESET LINES</button>
      <button class="btn-reset" style="border-color:#3a3050;color:#8060a0" onclick="rebuildSharedLayout()">&#8644; REBUILD PINS</button>
    </div>

    <div class="sep"></div>

    <div style="font-size:10px;color:var(--text-dim);line-height:1.7">
      <b style="color:var(--accent)">OPTICAL DEPTH</b><br>
      &tau; = &int; n &sigma; dz<br><br>
      First-hit height ~ mean free path. Ball = photon. Pins = absorbers.<br><br>
      <b style="color:var(--accent2)">Orange</b> = avg first-hit depth.<br>
      <b style="color:var(--accent)">Cyan</b> = individual hits.<br><br>
      <span style="color:#5a6070">SPACE = drop &nbsp; R = reset</span>
    </div>

  </div>

  <div class="canvas-area" id="canvas-area"></div>
</div>

<script>
// ============================================================
//  CONSTANTS
// ============================================================
const G         = 0.38;
const DAMPING   = 0.55;
const FRICTION  = 0.985;
const SIM_STEPS = 3;
const MAX_BALLS = 8;
const TRAIL_LEN = 55;
const TRAIL_A   = 0.18;
const BALL_R    = 5;   // fixed ball radius — only cross section (pin size) changes

// maxHits per scenario: how many pin contacts before the ball is absorbed
const SCENARIO_MAX_HITS = { 1: 1, 2: 3, 3: 3, 4: 3 };

// ============================================================
//  SHARED PIN LAYOUT
//  In compare mode both boards use the same x/y/isLarge layout;
//  only the pin radii (from each board's params) differ.
//  sharedLayout entries: { fracX, fracY, isLarge }
//  (fractional coords 0-1 so they scale to any canvas size)
// ============================================================
// sharedLayout stores only geometry — { fracX, u, largeSeed }
//   fracX:     horizontal position (fractional, 0-1)
//   u:         raw uniform random in (0,1) for the vertical position.
//              The actual fracY is computed on the fly from u + each board's scaleH,
//              so changing scaleH crunches existing pins without re-randomising.
//   largeSeed: per-pin uniform [0,1] used by each board independently to decide
//              isLarge from that board's own largeFrac — metals are per-board, not shared.
let sharedLayout = [];

function generateSharedLayout(density) {
  sharedLayout = [];
  const marginFrac = 0.05;
  for (let i = 0; i < density; i++) {
    sharedLayout.push({
      fracX:     marginFrac + Math.random() * (1 - marginFrac * 2),
      u:         0.001 + Math.random() * 0.998,
      largeSeed: Math.random(),
    });
  }
}

// Maps raw uniform u -> fracY in [0,1] for a given H_norm.
// fracY=0 is top of canvas, fracY=1 is bottom.
// Dense toward BOTTOM: high H_norm = nearly uniform, low H_norm = packed near bottom.
function uToFracY(u, H_norm) {
  const expNeg = Math.exp(-1 / H_norm);
  const frac   = -H_norm * Math.log(1 - u * (1 - expNeg));
  return Math.min(1, Math.max(0, 1 - frac));  // flip so density peaks at bottom
}

// Build a board's pin array from sharedLayout + that board's own params.
// scaleH and largeFrac are applied here, so boards can differ independently.
function pinsFromLayout(board) {
  const topMargin = 40;
  const botMargin = 20;
  const usableH   = board.H - topMargin - botMargin;
  const p         = board.params;
  const H_norm    = Math.max(0.05, (p.scaleH / 100) * 4.0);
  return sharedLayout.map(pt => {
    const fracY   = uToFracY(pt.u, H_norm);
    const isLarge = pt.largeSeed < p.largeFrac;
    return {
      x:     pt.fracX * board.W,
      y:     topMargin + fracY * usableH,
      r:     isLarge ? p.largePinR : p.pinR,
      large: isLarge,
    };
  });
}

// ============================================================
//  BOARD STATE
// ============================================================
let mode             = 'single';
let selectedBoardIdx = 0;

function makeBoard(label, color) {
  return {
    label, color,
    canvas: null, ctx: null,
    W: 0, H: 0,
    pins: [],          // computed from sharedLayout + params
    balls: [],
    lines: [],
    avgY: null,
    params: getDefaultParams(),
    scenario: 1,
    animId: null,
  };
}

function getDefaultParams() {
  return { pinR: 4, largePinR: 14, largeFrac: 0, density: 50, scaleH: 100 };
}

let boards        = [makeBoard('BOARD A', '#4af0c0')];
let compareBoards = [makeBoard('BOARD A', '#4af0c0'), makeBoard('BOARD B', '#a06af0')];
compareBoards[0].scenario = 1;
compareBoards[1].scenario = 1;

function activeBoards() { return mode === 'single' ? boards : compareBoards; }

function targetBoard() {
  return mode === 'single' ? boards[0] : compareBoards[selectedBoardIdx];
}

// ============================================================
//  LAYOUT / RESIZE
// ============================================================
function setMode(m) {
  mode = m;
  document.getElementById('tab-single').classList.toggle('active', m === 'single');
  document.getElementById('tab-compare').classList.toggle('active', m === 'compare');
  const isCompare = m === 'compare';
  document.getElementById('board-selector').classList.toggle('visible', isCompare);
  document.getElementById('board-sel-sep').style.display = isCompare ? '' : 'none';
  document.getElementById('shared-note').classList.toggle('visible', isCompare);
  const sidebar = document.getElementById('sidebar');
  if (!isCompare) { sidebar.classList.remove('targeting-a','targeting-b'); }
  else { selectedBoardIdx = 0; selectBoard(0); }
  buildLayout();
}

function buildLayout() {
  const area = document.getElementById('canvas-area');
  area.innerHTML = '';

  activeBoards().forEach((board, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'plinko-wrapper' + (i < activeBoards().length - 1 ? ' side-split' : '');

    const lbl = document.createElement('div');
    lbl.className = 'plinko-label';
    lbl.innerHTML = `<span class="lbl-tag" style="color:${board.color}">${board.label}</span>
      <span id="lbl-tau-${i}">tau = --</span>
      <span id="lbl-hits-${i}">HITS: 0</span>`;
    wrap.appendChild(lbl);

    const cv = document.createElement('canvas');
    wrap.appendChild(cv);
    board.canvas = cv;
    board.ctx    = cv.getContext('2d');

    const stats = document.createElement('div');
    stats.className = 'stats-bar';
    stats.innerHTML = `<span class="stat">FIRST HIT: <span id="hit-y-${i}">--</span></span>
      <span class="stat">AVG DEPTH: <span id="avg-y-${i}">--</span></span>
      <span class="stat">DROPS: <span id="n-drops-${i}">0</span></span>`;
    wrap.appendChild(stats);

    area.appendChild(wrap);
    const ro = new ResizeObserver(() => resizeBoard(board));
    ro.observe(cv);
  });

  // Sync single board's params from UI on init
  if (mode === 'single') syncParamsFromUI(boards[0]);

  startAllLoops();
}

function resizeBoard(board) {
  const cv   = board.canvas;
  const rect = cv.getBoundingClientRect();
  const dpr  = window.devicePixelRatio || 1;
  cv.width   = rect.width  * dpr;
  cv.height  = rect.height * dpr;
  board.ctx.scale(dpr, dpr);
  board.W = rect.width;
  board.H = rect.height;
  // Rebuild pin positions from layout (layout already exists)
  if (sharedLayout.length === 0) generateSharedLayout(board.params);
  board.pins = pinsFromLayout(board);
}

// ============================================================
//  PHYSICS
// ============================================================
function dropBall() {
  activeBoards().forEach(board => {
    if (board.balls.length >= MAX_BALLS) board.balls.shift();
    const marginX = 18 + BALL_R;
    const dropX   = marginX + Math.random() * (board.W - marginX * 2);
    const maxHits = SCENARIO_MAX_HITS[board.scenario] ?? 3;
    board.balls.push({
      x: dropX, y: 10,
      vx: (Math.random() - 0.5) * 1.5, vy: 1.5,
      r: BALL_R,
      hitCount: 0, firstHitDone: false, maxHits,
      trail: [], done: false,
    });
  });
}

function stepBall(ball, board) {
  if (ball.done) return;
  for (let s = 0; s < SIM_STEPS; s++) {
    ball.vy += G / SIM_STEPS;
    ball.vx *= Math.pow(FRICTION, 1 / SIM_STEPS);
    ball.x  += ball.vx;
    ball.y  += ball.vy;

    if (ball.x - ball.r < 0)        { ball.x = ball.r;           ball.vx =  Math.abs(ball.vx) * DAMPING; }
    if (ball.x + ball.r > board.W)  { ball.x = board.W - ball.r; ball.vx = -Math.abs(ball.vx) * DAMPING; }

    for (const pin of board.pins) {
      const dx   = ball.x - pin.x;
      const dy   = ball.y - pin.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const minD = ball.r + pin.r;
      if (dist < minD && dist > 0.001) {
        const nx = dx / dist, ny = dy / dist;
        ball.x += nx * (minD - dist);
        ball.y += ny * (minD - dist);
        const dot = ball.vx*nx + ball.vy*ny;
        ball.vx = (ball.vx - 2*dot*nx) * DAMPING;
        ball.vy = (ball.vy - 2*dot*ny) * DAMPING;
        ball.hitCount++;
        if (!ball.firstHitDone) { ball.firstHitDone = true; recordLine(board, ball.y); }
        if (ball.hitCount >= ball.maxHits) { ball.done = true; break; }
      }
    }
    if (ball.done) break;
    if (ball.y > board.H + 30) {
      ball.done = true;
      if (!ball.firstHitDone) { ball.firstHitDone = true; recordLine(board, board.H * 0.98); }
    }
  }
  ball.trail.push({ x: ball.x, y: ball.y });
  if (ball.trail.length > TRAIL_LEN) ball.trail.shift();
}

function recordLine(board, y) {
  board.lines.push({ y });
  board.avgY = board.lines.reduce((s,l) => s+l.y, 0) / board.lines.length;
}

// ============================================================
//  RENDER
// ============================================================
function render(board) {
  const ctx = board.ctx;
  const W = board.W, H = board.H;
  if (!W || !H) return;

  ctx.clearRect(0, 0, W, H);

  // Background
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, 'rgba(14,18,28,1)');
  bg.addColorStop(1, 'rgba(8,10,16,1)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
  const atm = ctx.createLinearGradient(0, 0, 0, H);
  atm.addColorStop(0, 'rgba(30,60,90,0)');
  atm.addColorStop(1, 'rgba(30,60,90,0.08)');
  ctx.fillStyle = atm;
  ctx.fillRect(0, 0, W, H);

  // Pins
  board.pins.forEach(pin => {
    ctx.beginPath();
    ctx.arc(pin.x, pin.y, pin.r, 0, Math.PI*2);
    if (pin.large) {
      ctx.fillStyle = 'rgba(130,80,190,0.88)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(170,110,240,0.5)';
      ctx.lineWidth = 1.2;
      ctx.stroke();
    } else {
      ctx.fillStyle = 'rgba(55,62,80,0.92)';
      ctx.fill();
    }
  });

  // Hit lines
  ctx.setLineDash([3,4]);
  board.lines.forEach((line, idx) => {
    const isLast = idx === board.lines.length - 1;
    ctx.strokeStyle = isLast ? 'rgba(74,240,192,0.6)' : 'rgba(74,240,192,0.18)';
    ctx.lineWidth   = isLast ? 1.5 : 0.8;
    ctx.beginPath(); ctx.moveTo(0, line.y); ctx.lineTo(W, line.y); ctx.stroke();
  });
  ctx.setLineDash([]);

  // Average line
  if (board.avgY !== null && board.lines.length > 1) {
    ctx.strokeStyle = 'rgba(240,112,64,0.9)';
    ctx.lineWidth   = 2.5;
    ctx.beginPath(); ctx.moveTo(0, board.avgY); ctx.lineTo(W, board.avgY); ctx.stroke();
    ctx.fillStyle = 'rgba(240,112,64,0.9)';
    ctx.font = '10px Space Mono, monospace';
    ctx.fillText('AVG  z=' + (board.avgY/H*100).toFixed(0)+'%', 5, board.avgY - 5);
  }

  // Ghost ball preview at top (shows fixed ball size)
  ctx.beginPath();
  ctx.arc(W * 0.5, 14, BALL_R, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(74,240,192,0.15)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(74,240,192,0.4)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Active balls
  board.balls.forEach(ball => {
    if (ball.done && ball.trail.length === 0) return;
    const br = ball.r;
    for (let i = 0; i < ball.trail.length; i++) {
      const pt    = ball.trail[i];
      const alpha = (i / ball.trail.length) * TRAIL_A;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, br * 0.6 * (i / ball.trail.length), 0, Math.PI*2);
      ctx.fillStyle = `rgba(74,240,192,${Math.max(0, alpha)})`;
      ctx.fill();
    }
    if (!ball.done) {
      const grd = ctx.createRadialGradient(ball.x-br*0.3, ball.y-br*0.3, 0, ball.x, ball.y, br*1.5);
      grd.addColorStop(0,    'rgba(200,255,245,0.98)');
      grd.addColorStop(0.45, board.color);
      grd.addColorStop(1,    'rgba(20,200,140,0)');
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, br, 0, Math.PI*2);
      ctx.fillStyle = grd;
      ctx.fill();
    }
  });

  updateStatsUI(board);
}

function updateStatsUI(board) {
  const idx = activeBoards().indexOf(board);
  if (idx < 0) return;
  const hits = board.lines.length;
  const elHits   = document.getElementById(`lbl-hits-${idx}`);
  const elTau    = document.getElementById(`lbl-tau-${idx}`);
  const elHitY   = document.getElementById(`hit-y-${idx}`);
  const elAvgY   = document.getElementById(`avg-y-${idx}`);
  const elNDrops = document.getElementById(`n-drops-${idx}`);
  if (!elHits) return;
  elHits.textContent = 'HITS: ' + hits;
  if (board.avgY !== null && hits > 0) {
    const frac = board.avgY / board.H;
    const tau  = -Math.log(Math.max(0.001, 1 - frac));
    elTau.textContent  = 'tau ~ ' + (isFinite(tau) ? tau.toFixed(2) : '--');
    elAvgY.textContent = (frac * 100).toFixed(1) + '%';
  }
  if (hits > 0) elHitY.textContent = (board.lines[hits-1].y / board.H * 100).toFixed(1) + '%';
  if (elNDrops) elNDrops.textContent = hits;
}

// ============================================================
//  ANIMATION LOOP
// ============================================================
function startAllLoops() {
  activeBoards().forEach(board => {
    if (board.animId) cancelAnimationFrame(board.animId);
    (function loop() {
      board.balls.forEach(b => stepBall(b, board));
      board.balls.forEach(b => { if (b.done && b.trail.length > 0) b.trail.shift(); });
      board.balls = board.balls.filter(b => !(b.done && b.trail.length === 0));
      render(board);
      board.animId = requestAnimationFrame(loop);
    })();
  });
}

// ============================================================
//  UI CONTROLS
// ============================================================

// Called whenever a slider moves.
// Density changes -> regenerate shared layout (new x/y seeds) for ALL boards.
// scaleH, largeFrac, pinR, largePinR -> per-board only; just rebuild this board's pins.
function onSlider() {
  const params = readUIParams();
  const b      = targetBoard();

  const densityChanged = b.params.density !== params.density;
  Object.assign(b.params, params);

  if (densityChanged) {
    generateSharedLayout(params.density);
    // All active boards get new positions; each keeps its own scaleH / largeFrac
    activeBoards().forEach(ab => {
      ab.params.density = params.density;
      ab.pins  = pinsFromLayout(ab);
      ab.lines = []; ab.avgY = null; ab.balls = [];
    });
  } else {
    // scaleH, largeFrac, or cross-section changed -- only this board is affected
    b.pins  = pinsFromLayout(b);
    b.lines = []; b.avgY = null; b.balls = [];
  }

  updateLabels();
}

function readUIParams() {
  return {
    pinR:      +document.getElementById('sl-pin').value,
    largePinR: +document.getElementById('sl-lpin').value,
    largeFrac: +document.getElementById('sl-lfrac').value / 100,
    density:   +document.getElementById('sl-dens').value,
    scaleH:    +document.getElementById('sl-H').value,
  };
}

function syncParamsFromUI(board) {
  Object.assign(board.params, readUIParams());
}

function updateLabels() {
  document.getElementById('lbl-pin').textContent   = document.getElementById('sl-pin').value;
  document.getElementById('lbl-lpin').textContent  = document.getElementById('sl-lpin').value;
  document.getElementById('lbl-lfrac').textContent = document.getElementById('sl-lfrac').value + '%';
  document.getElementById('lbl-dens').textContent  = document.getElementById('sl-dens').value;
  document.getElementById('lbl-H').textContent     = (document.getElementById('sl-H').value / 100).toFixed(2);
}

function setSliders(obj) {
  if (obj.pinR      !== undefined) document.getElementById('sl-pin').value   = obj.pinR;
  if (obj.largePinR !== undefined) document.getElementById('sl-lpin').value  = obj.largePinR;
  if (obj.largeFrac !== undefined) document.getElementById('sl-lfrac').value = Math.round(obj.largeFrac * 100);
  if (obj.density   !== undefined) document.getElementById('sl-dens').value  = obj.density;
  if (obj.scaleH    !== undefined) document.getElementById('sl-H').value     = obj.scaleH;
  updateLabels();
}

function loadParamsToUI(params, scenarioN) {
  document.getElementById('sl-pin').value   = params.pinR;
  document.getElementById('sl-lpin').value  = params.largePinR;
  document.getElementById('sl-lfrac').value = Math.round(params.largeFrac * 100);
  document.getElementById('sl-dens').value  = params.density;
  document.getElementById('sl-H').value     = params.scaleH;
  updateLabels();
  [1,2,3,4].forEach(i => document.getElementById('sc'+i).classList.remove('active'));
  if (scenarioN) document.getElementById('sc'+scenarioN).classList.add('active');
}

// ============================================================
//  BOARD SELECTOR (compare mode)
// ============================================================
function selectBoard(idx) {
  selectedBoardIdx = idx;
  document.getElementById('sel-btn-a').classList.toggle('active', idx === 0);
  document.getElementById('sel-btn-b').classList.toggle('active', idx === 1);
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.toggle('targeting-a', idx === 0);
  sidebar.classList.toggle('targeting-b', idx === 1);
  // Load this board's params into sliders
  loadParamsToUI(compareBoards[idx].params, compareBoards[idx].scenario);
}

// ============================================================
//  SCENARIOS
//  S1 EUV:   large cross section, stops on 1st hit
//  S2 X-ray: small cross section, survives 2-3 hits
//  S3 X-ray + metals: same small pins as S2, fraction of large metal pins
//  S4 S3 + compressed scale height
// ============================================================
const SCENARIOS = {
  1: { label:'EUV',               pinR:12, largePinR:14, largeFrac:0,    density:40, scaleH:100 },
  2: { label:'X-RAYS',            pinR:3,  largePinR:14, largeFrac:0,    density:40, scaleH:100 },
  3: { label:'X-RAYS + METALS',   pinR:3,  largePinR:14, largeFrac:0.15, density:40, scaleH:100 },
  4: { label:'METALS+COMPRESSED', pinR:3,  largePinR:14, largeFrac:0.15, density:40, scaleH:15  },
};

function applyScenario(n) {
  const b = targetBoard();
  b.scenario = n;
  [1,2,3,4].forEach(i => document.getElementById('sc'+i).classList.remove('active'));
  document.getElementById('sc'+n).classList.add('active');

  const sc = SCENARIOS[n];
  const densityChanged = b.params.density !== sc.density;

  setSliders(sc);
  Object.assign(b.params, sc);  // applies pinR, largePinR, largeFrac, density, scaleH to THIS board only

  if (densityChanged) {
    // New density means we regenerate shared x/u seeds for everyone
    generateSharedLayout(sc.density);
    activeBoards().forEach(ab => {
      ab.params.density = sc.density;
      ab.pins  = pinsFromLayout(ab);
      ab.lines = []; ab.avgY = null; ab.balls = [];
    });
  } else {
    // Only this board's cross-sections / scaleH / largeFrac changed
    b.pins  = pinsFromLayout(b);
    b.lines = []; b.avgY = null; b.balls = [];
  }
}

// ============================================================
//  RESET / REBUILD
// ============================================================
function resetLines() {
  targetBoard().lines = [];
  targetBoard().avgY  = null;
  targetBoard().balls = [];
}

function rebuildSharedLayout() {
  // Regenerate x/u seeds from scratch using current density, then rebuild all boards
  const b = targetBoard();
  Object.assign(b.params, readUIParams());
  generateSharedLayout(b.params.density);
  activeBoards().forEach(ab => {
    ab.params.density = b.params.density;
    ab.pins  = pinsFromLayout(ab);
    ab.lines = []; ab.avgY = null; ab.balls = [];
  });
}

// ============================================================
//  KEYBOARD
// ============================================================
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); dropBall(); }
  if (e.code === 'KeyR')  resetLines();
});

// ============================================================
//  BOOT
// ============================================================
updateLabels();
// Seed a default layout before anything renders
generateSharedLayout(getDefaultParams().density);
buildLayout();
</script>
